<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    function download(url, callback) {
        setTimeout(() => {
        // script to download the picture here
        document.write(`Downloading ${url} ...`);
        
        // process the picture once it is completed
        callback(url);
    }, 1000);
}


function process(picture) {
    document.write(`Processing ${picture}`);
}

let url = 'https://images.pexels.com/photos/133472/pexels-photo-133472.jpeg?auto=compress&cs=tinysrgb&w=600';
download(url, process);

    </script>
</body>
</html>
